name: PythonCheck

# No paths filter: these jobs are required status checks for auto-merge,
# so they must run (and pass) on every PR, including ones that only touch
# data files, workflows or docs.
on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Run lint
      run: uv run task lint

    - name: Run typecheck
      run: uv run task typecheck

    - name: Run format
      run: uv run task format --check

    - name: Run tests
      run: uv run task test

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # hatch-vcs derives the version from git tags

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Build package
      run: uv build

    - name: Smoke test built wheel
      run: >
        uv run --isolated --no-project --with dist/*.whl
        python -c "import kanasim; c = kanasim.create_kana_distance_calculator(); assert c.calculate('カナダ ', 'カナダ') == 0"
