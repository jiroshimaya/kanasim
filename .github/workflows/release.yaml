name: Release

# Automatically publishes a patch release to PyPI when package code lands on
# main (typically via auto-merged PRs that passed PythonCheck).
# For a minor/major bump, run this workflow manually via workflow_dispatch.
# Add "[skip release]" to the merge commit message to skip publishing.
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pyproject.toml'
  workflow_dispatch:
    inputs:
      increment:
        description: Version increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip release]') }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # update_version.sh and hatch-vcs need the tag history

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Run tests
      run: uv run task test

    - name: Bump version tag
      run: bash .github/scripts/update_version.sh -i ${{ inputs.increment || 'patch' }}

    - name: Build
      run: uv build

    - name: Publish to PyPI
      run: uv publish --token ${{ secrets.PYPI_TOKEN }}

    - name: Create GitHub Release
      run: gh release create "$(git describe --tags --abbrev=0)" --generate-notes
      env:
        GH_TOKEN: ${{ github.token }}
